services:
  tools:
    build: .
    container_name: tools-aaris
    ports:
      - "8080:80"
    volumes:
      - ./tools:/usr/share/nginx/html/tools:ro
    depends_on:
      converter:
        condition: service_healthy
    restart: unless-stopped

  converter:
    build: ./converter-api
    container_name: tools-converter
    environment:
      - QTWEBENGINE_CHROMIUM_FLAGS=--no-sandbox
      - QT_QPA_PLATFORM=offscreen
      - OLLAMA_URL=${OLLAMA_URL:-http://10.10.8.10:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
    volumes:
      - shares-data:/app/shares
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    # No ports exposed — only accessible via nginx proxy

volumes:
  shares-data:
    driver: local
