server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;

    # Main landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve tools as static folders
    location /tools/ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Prevent browsers from caching tool HTML after deploys
    location ~ /tools/[^/]+/index\.html$ {
        add_header Cache-Control "no-cache";
    }

    # Manifest endpoint
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Converter API proxy
    location /api/ {
        proxy_pass http://converter:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_body_timeout 3600s;
        client_max_body_size 0;
    }

    # Cache static assets (no immutable — tool files are updated in-place)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
