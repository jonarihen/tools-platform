<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How to Add Tools – tools.aaris.tech</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0c0c0f 0%, #141420 40%, #0f1118 100%);
      font-family: 'Outfit', sans-serif;
      color: #e8e8ed;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }
    .back {
      display: inline-block; margin-bottom: 12px; font-size: 13px;
      font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.2);
      text-decoration: none; letter-spacing: 0.1em;
    }
    .back:hover { color: rgba(255,255,255,0.4); }
    header { text-align: center; margin-bottom: 40px; }
    .icon { font-size: 32px; margin-bottom: 12px; }
    h1.page-title {
      font-size: 40px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f8f8ff 0%, #a0a0b8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.45); font-weight: 300; margin-bottom: 32px; }

    .copy-bar {
      position: sticky; top: 12px; z-index: 10; margin-bottom: 32px;
    }
    .btn-copy {
      width: 100%; padding: 16px 32px;
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.08));
      border: 1px solid rgba(245,158,11,0.3); border-radius: 14px;
      color: #f59e0b; font-size: 16px; font-weight: 600;
      font-family: 'Outfit', sans-serif; cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .btn-copy:hover { background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(245,158,11,0.12)); }
    .btn-copy.copied { color: #4ade80; border-color: rgba(34,197,94,0.3); background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.08)); }

    .loading {
      text-align: center; padding: 60px; color: rgba(255,255,255,0.3);
      font-family: 'JetBrains Mono', monospace; font-size: 14px;
    }

    .guide {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 36px;
      line-height: 1.7;
    }
    .guide h1 { font-size: 28px; font-weight: 700; color: #f8f8ff; margin: 48px 0 16px; letter-spacing: -0.02em; }
    .guide h1:first-child { margin-top: 0; }
    .guide h2 { font-size: 22px; font-weight: 600; color: #e0e0e8; margin: 40px 0 14px; letter-spacing: -0.01em; }
    .guide h3 { font-size: 17px; font-weight: 600; color: #c8c8d4; margin: 28px 0 10px; }
    .guide h4 { font-size: 15px; font-weight: 600; color: #b0b0c0; margin: 20px 0 8px; }
    .guide p { color: rgba(255,255,255,0.7); margin: 0 0 14px; font-size: 15px; }
    .guide strong { color: #e8e8ed; font-weight: 600; }
    .guide em { color: rgba(255,255,255,0.6); font-style: italic; }
    .guide a { color: #f59e0b; text-decoration: none; }
    .guide a:hover { text-decoration: underline; }
    .guide hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 32px 0; }
    .guide ul, .guide ol { padding-left: 24px; margin: 0 0 14px; color: rgba(255,255,255,0.7); }
    .guide li { margin-bottom: 6px; font-size: 15px; }
    .guide code {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      background: rgba(255,255,255,0.06); padding: 2px 7px; border-radius: 5px;
      color: #f59e0b;
    }
    .guide pre {
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 18px 20px; margin: 0 0 16px;
      overflow-x: auto;
    }
    .guide pre code {
      background: none; padding: 0; border-radius: 0;
      font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.65);
    }
    .guide table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 14px; }
    .guide th {
      text-align: left; padding: 10px 14px; font-weight: 600; color: rgba(255,255,255,0.5);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .guide td {
      padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.65);
    }
    .guide td code, .guide th code { font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← tools.aaris.tech</a>
    <header>
      <div class="icon">📋</div>
      <h1 class="page-title">How to Add Tools</h1>
      <p class="subtitle">Copy this guide and paste it into any AI model to have it build a new tool</p>
    </header>

    <div class="copy-bar">
      <button class="btn-copy" id="copyBtn" onclick="copyGuide()">Copy entire guide to clipboard</button>
    </div>

    <div class="guide" id="guide">
      <div class="loading">Loading guide...</div>
    </div>
  </div>

  <script>
    let guideMarkdown = '';

    async function loadGuide() {
      try {
        const res = await fetch('./guide.md');
        guideMarkdown = await res.text();
        document.getElementById('guide').innerHTML = marked.parse(guideMarkdown);
      } catch (e) {
        document.getElementById('guide').innerHTML = '<p style="color:#f87171">Failed to load guide.md</p>';
      }
    }

    function copyGuide() {
      if (!guideMarkdown) return;
      const btn = document.getElementById('copyBtn');
      navigator.clipboard.writeText(guideMarkdown).then(function() {
        btn.textContent = '\u2713 Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy entire guide to clipboard';
          btn.classList.remove('copied');
        }, 2500);
      });
    }

    loadGuide();
  </script>
</body>
</html>
