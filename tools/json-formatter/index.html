<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter – tools.aaris.tech</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <style>
    .container { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }
    header { text-align: center; margin-bottom: 40px; }
    .icon { font-size: 32px; margin-bottom: 12px; }
    h1 {
      font-size: 40px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f8f8ff 0%, #a0a0b8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.45); font-weight: 300; }

    .editor-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    textarea {
      width: 100%; min-height: 320px; padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; color: #e8e8ed; font-size: 13px; line-height: 1.6;
      font-family: 'JetBrains Mono', monospace; outline: none; resize: vertical;
      transition: border-color 0.2s;
      tab-size: 2;
    }
    textarea:focus { border-color: rgba(255,255,255,0.15); }
    textarea::placeholder { color: rgba(255,255,255,0.15); }

    .stats {
      display: flex; gap: 16px; justify-content: flex-end;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.2); margin-bottom: 20px;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }

    .btn-primary {
      padding: 14px 28px;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3); border-radius: 12px;
      color: #f59e0b; font-size: 15px; font-weight: 600;
      font-family: 'Outfit', sans-serif; cursor: pointer; flex: 1;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(245,158,11,0.1)); }

    .btn-secondary {
      padding: 14px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 500;
      font-family: 'Outfit', sans-serif; cursor: pointer; flex: 1;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }

    .status {
      padding: 12px 16px; border-radius: 10px; font-size: 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      animation: fadeIn 0.3s ease;
    }
    .status.ok {
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      color: #4ade80;
    }
    .status.error {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }
    .status.info {
      background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2);
      color: #60a5fa;
    }

    .indent-control {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: rgba(255,255,255,0.35);
      margin-bottom: 20px;
    }
    .indent-control select {
      padding: 6px 10px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #e8e8ed; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; outline: none; cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← tools.aaris.tech</a>
    <header>
      <div class="icon">{ }</div>
      <h1>JSON Formatter</h1>
      <p class="subtitle">Paste, format, validate, copy</p>
    </header>

    <div class="indent-control">
      <span>Indent:</span>
      <select id="indent">
        <option value="2" selected>2 spaces</option>
        <option value="4">4 spaces</option>
        <option value="tab">Tab</option>
      </select>
    </div>

    <div class="editor-wrap">
      <textarea id="input" placeholder="Paste your JSON here..." spellcheck="false"></textarea>
    </div>

    <div class="stats">
      <span id="charCount">0 chars</span>
      <span id="lineCount">0 lines</span>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="formatJSON()">Format</button>
      <button class="btn-secondary" onclick="minifyJSON()">Minify</button>
      <button class="btn-secondary" onclick="copyJSON()">Copy</button>
      <button class="btn-secondary" onclick="clearJSON()">Clear</button>
    </div>

    <div id="status"></div>
  </div>

  <script>
    const input = document.getElementById('input');
    const statusEl = document.getElementById('status');
    const charCount = document.getElementById('charCount');
    const lineCount = document.getElementById('lineCount');
    const indentSelect = document.getElementById('indent');

    function getIndent() {
      const val = indentSelect.value;
      return val === 'tab' ? '\t' : parseInt(val);
    }

    function updateStats() {
      const val = input.value;
      charCount.textContent = val.length.toLocaleString() + ' chars';
      lineCount.textContent = (val ? val.split('\n').length : 0).toLocaleString() + ' lines';
    }

    function showStatus(msg, type) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = msg;
      if (type === 'ok' || type === 'info') {
        setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 3000);
      }
    }

    function formatJSON() {
      if (!input.value.trim()) return;
      try {
        const parsed = JSON.parse(input.value);
        input.value = JSON.stringify(parsed, null, getIndent());
        updateStats();
        const keys = typeof parsed === 'object' && parsed !== null
          ? (Array.isArray(parsed) ? parsed.length + ' items' : Object.keys(parsed).length + ' keys')
          : typeof parsed;
        showStatus('✓ Valid JSON — ' + keys, 'ok');
      } catch (e) {
        const match = e.message.match(/position (\d+)/);
        if (match) {
          const pos = parseInt(match[1]);
          input.setSelectionRange(pos, pos + 1);
          input.focus();
        }
        showStatus('✗ ' + e.message, 'error');
      }
    }

    function minifyJSON() {
      if (!input.value.trim()) return;
      try {
        const parsed = JSON.parse(input.value);
        input.value = JSON.stringify(parsed);
        updateStats();
        showStatus('✓ Minified — ' + input.value.length.toLocaleString() + ' chars', 'ok');
      } catch (e) {
        showStatus('✗ ' + e.message, 'error');
      }
    }

    function copyJSON() {
      if (!input.value.trim()) return;
      navigator.clipboard?.writeText(input.value).then(() => {
        showStatus('✓ Copied to clipboard', 'info');
      });
    }

    function clearJSON() {
      input.value = '';
      statusEl.textContent = '';
      statusEl.className = '';
      updateStats();
      input.focus();
    }

    // Handle tab key in textarea
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = input.selectionStart;
        const end = input.selectionEnd;
        input.value = input.value.substring(0, start) + '  ' + input.value.substring(end);
        input.selectionStart = input.selectionEnd = start + 2;
      }
      // Ctrl/Cmd + Enter to format
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        formatJSON();
      }
    });

    input.addEventListener('input', updateStats);
    updateStats();
  </script>
<script src="/track.js"></script>
</body>
</html>
