<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocistrator – tools.aaris.tech</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
  <style>
    .container { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }
    .back-row { text-align: center; margin-bottom: 12px; }
    header { text-align: center; margin-bottom: 48px; }
    .icon { font-size: 32px; margin-bottom: 12px; }
    h1 {
      font-size: 40px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f8f8ff 0%, #a0a0b8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; text-align: center;
    }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.45); font-weight: 300; text-align: center; }

    /* ── Login ─────────────────────────────────────── */
    #loginPanel { max-width: 380px; margin: 0 auto; }
    .login-input {
      width: 100%; padding: 16px 20px; margin-bottom: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: #e8e8ed;
      font-size: 15px; font-family: 'Outfit', sans-serif; outline: none;
    }
    .login-input:focus { border-color: rgba(255,255,255,0.18); }
    .login-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3); border-radius: 14px;
      color: #f59e0b; font-size: 16px; font-weight: 600;
      font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(245,158,11,0.1)); }
    .login-error {
      text-align: center; font-size: 13px; color: #ef4444;
      margin-top: 12px; min-height: 20px;
    }

    /* ── Dashboard ────────────────────────────────── */
    #dashboard[hidden] { display: none; }

    .stat-cards {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 20px;
    }
    .stat-card {
      padding: 20px; text-align: center;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
    }
    .stat-value {
      font-size: 32px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, #f8f8ff, #a0a0b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-size: 12px; color: rgba(255,255,255,0.3);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em; margin-top: 4px;
    }

    /* ── Highlights ───────────────────────────────── */
    .highlights {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px; margin-bottom: 36px;
    }
    .hl-card {
      padding: 16px; text-align: center;
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    .hl-value {
      font-size: 22px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.75);
    }
    .hl-label {
      font-size: 11px; color: rgba(255,255,255,0.25);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 3px;
    }
    .hl-icon { font-size: 18px; margin-bottom: 6px; }

    .tool-highlight {
      font-size: 11px; color: rgba(255,255,255,0.2);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 3px;
    }

    /* ── Charts ───────────────────────────────────── */
    .section-title {
      font-size: 18px; font-weight: 600; margin-bottom: 16px;
      color: rgba(255,255,255,0.7);
    }
    .chart-wrap {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 24px;
      margin-bottom: 36px; position: relative;
    }
    .chart-wrap canvas { max-height: 280px; }

    /* ── Tool list ────────────────────────────────── */
    .tool-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .tool-row {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; transition: all 0.2s;
      animation: fadeIn 0.4s ease both;
    }
    .tool-row.disabled { opacity: 0.4; }
    .tool-icon { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
    .tool-info { flex: 1; min-width: 0; }
    .tool-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .tool-desc {
      font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 300;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .tool-stats {
      display: flex; gap: 16px; flex-shrink: 0; align-items: center;
    }
    .tool-stat {
      text-align: center; min-width: 48px;
    }
    .tool-stat-val {
      font-size: 16px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.7);
    }
    .tool-stat-label {
      font-size: 9px; color: rgba(255,255,255,0.2);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* Mini bar behind each tool row */
    .tool-bar-wrap {
      width: 80px; height: 6px; flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border-radius: 3px; overflow: hidden;
    }
    .tool-bar {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #f59e0b, #3b82f6);
      transition: width 0.6s ease;
    }

    /* Toggle switch */
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; cursor: pointer;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; transition: all 0.25s;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      top: 3px; left: 3px; width: 16px; height: 16px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%; transition: all 0.25s;
    }
    .toggle input:checked + .toggle-track {
      background: rgba(52,211,153,0.2);
      border-color: rgba(52,211,153,0.4);
    }
    .toggle input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: #34d399;
    }

    .status-msg {
      text-align: center; font-size: 13px; margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.25); min-height: 20px;
    }

    .loading {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.2); font-size: 15px;
    }

    .logout-row { text-align: center; margin-top: 32px; }
    .logout-btn {
      padding: 10px 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; color: rgba(255,255,255,0.3);
      font-size: 13px; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-row">
      <a href="/" class="back">&larr; tools.aaris.tech</a>
    </div>

    <header>
      <div class="icon">⚙️</div>
      <h1>Ocistrator</h1>
      <p class="subtitle">Platform administration</p>
    </header>

    <!-- Login -->
    <div id="loginPanel">
      <input type="password" class="login-input" id="passwordInput"
             placeholder="Admin password" autocomplete="current-password" autofocus>
      <button class="login-btn" id="loginBtn">Sign in</button>
      <div class="login-error" id="loginError"></div>
    </div>

    <!-- Dashboard (hidden until authenticated) -->
    <div id="dashboard" hidden>
      <!-- Summary cards -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-value" id="statToday">-</div>
          <div class="stat-label">Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statWeek">-</div>
          <div class="stat-label">7 days</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotal">-</div>
          <div class="stat-label">All time</div>
        </div>
      </div>

      <!-- Highlights -->
      <div class="highlights" id="highlights"></div>

      <!-- Usage over time chart -->
      <div class="section-title">Usage over time</div>
      <div class="chart-wrap">
        <canvas id="lineChart"></canvas>
      </div>

      <!-- Per-tool breakdown chart -->
      <div class="section-title">Views by tool (30 days)</div>
      <div class="chart-wrap">
        <canvas id="barChart"></canvas>
      </div>

      <!-- Tool management -->
      <div class="section-title">Tools</div>
      <div class="tool-list" id="toolList">
        <div class="loading">Loading...</div>
      </div>
      <div class="status-msg" id="statusMsg"></div>

      <div class="logout-row">
        <button class="logout-btn" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    let token = sessionStorage.getItem('admin_token') || '';
    let allTools = [];
    let disabledSlugs = new Set();
    let stats = null;
    let lineChart = null;
    let barChart = null;

    // ── Auth ──────────────────────────────────────────────────────────────────
    function authHeaders() {
      return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }

    async function tryAutoLogin() {
      if (!token) return;
      try {
        const res = await fetch('/api/admin/verify', { headers: authHeaders() });
        if (res.ok) { showDashboard(); return; }
      } catch (_) {}
      token = '';
      sessionStorage.removeItem('admin_token');
    }

    async function login() {
      const pw = $('passwordInput').value;
      if (!pw) return;
      $('loginError').textContent = '';
      $('loginBtn').textContent = 'Signing in...';
      try {
        const res = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();
        if (!res.ok) {
          $('loginError').textContent = data.error || 'Login failed';
          $('loginBtn').textContent = 'Sign in';
          return;
        }
        token = data.token;
        sessionStorage.setItem('admin_token', token);
        showDashboard();
      } catch (e) {
        $('loginError').textContent = 'Connection error';
        $('loginBtn').textContent = 'Sign in';
      }
    }

    function logout() {
      token = '';
      sessionStorage.removeItem('admin_token');
      $('dashboard').hidden = true;
      $('loginPanel').hidden = false;
      $('passwordInput').value = '';
      $('passwordInput').focus();
    }

    $('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    $('loginBtn').addEventListener('click', login);
    $('logoutBtn').addEventListener('click', logout);

    // ── Dashboard ─────────────────────────────────────────────────────────────
    async function showDashboard() {
      $('loginPanel').hidden = true;
      $('dashboard').hidden = false;
      await Promise.all([loadTools(), loadStats()]);
      render();
      try { renderCharts(); } catch (e) { console.warn('Charts unavailable:', e); }
    }

    async function loadTools() {
      try {
        const [mRes, dRes] = await Promise.all([
          fetch('/manifest.json'),
          fetch('/api/admin/disabled-tools'),
        ]);
        allTools = await mRes.json();
        const d = await dRes.json();
        disabledSlugs = new Set(d.disabled || []);
      } catch (_) {}
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/admin/stats', { headers: authHeaders() });
        if (res.ok) stats = await res.json();
      } catch (_) {}
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function fmtBytes(b) {
      if (b >= 1e12) return (b / 1e12).toFixed(1) + ' TB';
      if (b >= 1e9)  return (b / 1e9).toFixed(1) + ' GB';
      if (b >= 1e6)  return (b / 1e6).toFixed(1) + ' MB';
      if (b >= 1e3)  return (b / 1e3).toFixed(0) + ' KB';
      return b + ' B';
    }

    function evtCount(slug, event) {
      if (!stats || !stats.events || !stats.events[slug]) return 0;
      return (stats.events[slug][event] || {}).count || 0;
    }
    function evtValue(slug, event) {
      if (!stats || !stats.events || !stats.events[slug]) return 0;
      return (stats.events[slug][event] || {}).total_value || 0;
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      allTools.sort((a, b) => (a.order ?? 99) - (b.order ?? 99) || a.name.localeCompare(b.name));

      // Summary cards
      if (stats) {
        $('statToday').textContent = stats.summary.today.toLocaleString();
        $('statWeek').textContent  = stats.summary.week.toLocaleString();
        $('statTotal').textContent = stats.summary.total.toLocaleString();
      }

      // Highlights
      if (stats) {
        const conversions = evtCount('epub-to-pdf', 'conversion');
        const ticketsRanked = evtValue('ticket-ranker', 'rank');
        const rankings = evtCount('ticket-ranker', 'rank');
        const textFixes = evtCount('text-fixer', 'fix');
        const charsFixed = evtValue('text-fixer', 'fix');
        const uploads = evtCount('file-share', 'upload');
        const fs = stats.file_share || {};

        const cards = [
          { icon: '📖', value: conversions, label: 'EPUBs converted' },
          { icon: '📤', value: uploads, label: 'Files shared' },
          { icon: '💾', value: fmtBytes(fs.total_uploaded_bytes || 0), label: 'Total transferred' },
          { icon: '📂', value: fs.active_shares || 0, label: 'Active shares' },
          { icon: '⚡', value: ticketsRanked, label: 'Tickets ranked' },
          { icon: '🏆', value: rankings, label: 'Rankings completed' },
          { icon: '✏️', value: textFixes, label: 'Texts fixed' },
          { icon: '📝', value: fmtBytes(charsFixed), label: 'Characters proofread' },
        ].filter(c => c.value !== 0 && c.value !== '0 B');

        $('highlights').innerHTML = cards.map(c => `
          <div class="hl-card">
            <div class="hl-icon">${c.icon}</div>
            <div class="hl-value">${typeof c.value === 'number' ? c.value.toLocaleString() : c.value}</div>
            <div class="hl-label">${c.label}</div>
          </div>
        `).join('');
      }

      // Find max month views for relative bars
      let maxMonth = 1;
      if (stats) {
        for (const t of allTools) {
          const s = stats.tools[t.slug];
          if (s && s.month > maxMonth) maxMonth = s.month;
        }
      }

      $('toolList').innerHTML = allTools.map((tool, i) => {
        const enabled = !disabledSlugs.has(tool.slug);
        const s = stats ? (stats.tools[tool.slug] || { today: 0, week: 0, month: 0, total: 0 }) : null;
        const barPct = s ? Math.round((s.month / maxMonth) * 100) : 0;

        // Per-tool highlight
        let highlight = '';
        if (stats) {
          if (tool.slug === 'epub-to-pdf') {
            const n = evtCount('epub-to-pdf', 'conversion');
            if (n) highlight = n + ' conversion' + (n !== 1 ? 's' : '');
          } else if (tool.slug === 'file-share') {
            const fs = stats.file_share || {};
            const parts = [];
            if (fs.active_shares) parts.push(fs.active_shares + ' active');
            const up = evtCount('file-share', 'upload');
            if (up) parts.push(up + ' uploaded');
            if (fs.total_uploaded_bytes) parts.push(fmtBytes(fs.total_uploaded_bytes));
            highlight = parts.join(' · ');
          } else if (tool.slug === 'ticket-ranker') {
            const n = evtValue('ticket-ranker', 'rank');
            const r = evtCount('ticket-ranker', 'rank');
            const parts = [];
            if (n) parts.push(Math.round(n) + ' tickets ranked');
            if (r) parts.push(r + ' session' + (r !== 1 ? 's' : ''));
            highlight = parts.join(' · ');
          } else if (tool.slug === 'text-fixer') {
            const n = evtCount('text-fixer', 'fix');
            if (n) highlight = n + ' text' + (n !== 1 ? 's' : '') + ' fixed';
          }
        }

        return `
          <div class="tool-row ${enabled ? '' : 'disabled'}" id="row-${tool.slug}" style="animation-delay:${i * 40}ms">
            <span class="tool-icon">${tool.icon || '🔧'}</span>
            <div class="tool-info">
              <div class="tool-name">${esc(tool.name)}</div>
              <div class="tool-desc">${esc(tool.description || '')}</div>
              ${highlight ? '<div class="tool-highlight">' + highlight + '</div>' : ''}
            </div>
            ${s ? `
              <div class="tool-stats">
                <div class="tool-stat">
                  <div class="tool-stat-val">${s.today}</div>
                  <div class="tool-stat-label">Today</div>
                </div>
                <div class="tool-stat">
                  <div class="tool-stat-val">${s.week}</div>
                  <div class="tool-stat-label">7d</div>
                </div>
                <div class="tool-stat">
                  <div class="tool-stat-val">${s.total}</div>
                  <div class="tool-stat-label">Total</div>
                </div>
                <div class="tool-bar-wrap">
                  <div class="tool-bar" style="width:${barPct}%"></div>
                </div>
              </div>
            ` : ''}
            <label class="toggle">
              <input type="checkbox" ${enabled ? 'checked' : ''} data-slug="${tool.slug}">
              <span class="toggle-track"></span>
            </label>
          </div>
        `;
      }).join('');

      $('toolList').querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => toggleTool(cb.dataset.slug, cb.checked));
      });
    }

    async function toggleTool(slug, enable) {
      const action = enable ? 'enable' : 'disable';
      const row = $('row-' + slug);
      try {
        const res = await fetch(`/api/admin/tools/${slug}/${action}`, {
          method: 'POST', headers: authHeaders(),
        });
        if (!res.ok) throw new Error();
        if (enable) { disabledSlugs.delete(slug); row.classList.remove('disabled'); }
        else        { disabledSlugs.add(slug);    row.classList.add('disabled'); }
        const name = (allTools.find(t => t.slug === slug) || {}).name || slug;
        flash(`${name} ${enable ? 'enabled' : 'disabled'}`);
      } catch (_) {
        row.querySelector('input[type="checkbox"]').checked = !enable;
        flash('Failed to update');
      }
    }

    function flash(msg) {
      $('statusMsg').textContent = msg;
      setTimeout(() => { $('statusMsg').textContent = ''; }, 2500);
    }

    // ── Charts ────────────────────────────────────────────────────────────────
    const CHART_COLORS = [
      '#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#8b5cf6',
      '#ec4899', '#06b6d4', '#f97316', '#14b8a6', '#a855f7',
    ];

    function renderCharts() {
      if (!stats) return;
      renderLineChart();
      renderBarChart();
    }

    function renderLineChart() {
      const daily = stats.daily || {};
      // Build a full 30-day date axis
      const labels = [];
      const now = new Date();
      for (let i = 29; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        labels.push(d.toISOString().slice(0, 10));
      }

      // Build a dataset per tool (only tools with data)
      const datasets = [];
      const slugsWithData = Object.keys(daily);
      slugsWithData.sort();

      slugsWithData.forEach((slug, idx) => {
        const dayMap = {};
        daily[slug].forEach(d => { dayMap[d.date] = d.count; });
        const data = labels.map(l => dayMap[l] || 0);
        const tool = allTools.find(t => t.slug === slug);
        const color = CHART_COLORS[idx % CHART_COLORS.length];
        datasets.push({
          label: tool ? tool.name : slug,
          data: data,
          borderColor: color,
          backgroundColor: color + '18',
          borderWidth: 2,
          tension: 0.35,
          fill: true,
          pointRadius: 0,
          pointHitRadius: 8,
        });
      });

      // Also compute a total line
      const totalData = labels.map((_, di) =>
        datasets.reduce((sum, ds) => sum + ds.data[di], 0)
      );
      datasets.unshift({
        label: 'Total',
        data: totalData,
        borderColor: '#ffffff44',
        backgroundColor: '#ffffff08',
        borderWidth: 2,
        borderDash: [6, 3],
        tension: 0.35,
        fill: true,
        pointRadius: 0,
        pointHitRadius: 8,
      });

      const ctx = $('lineChart').getContext('2d');
      if (lineChart) lineChart.destroy();
      lineChart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels.map(l => l.slice(5)), datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#ffffff60', font: { family: 'Outfit', size: 11 }, boxWidth: 12, padding: 16 },
            },
            tooltip: {
              backgroundColor: '#1a1a2e',
              titleColor: '#ffffffcc',
              bodyColor: '#ffffff88',
              borderColor: '#ffffff15',
              borderWidth: 1,
              titleFont: { family: 'Outfit' },
              bodyFont: { family: 'JetBrains Mono', size: 12 },
            },
          },
          scales: {
            x: {
              grid: { color: '#ffffff08' },
              ticks: { color: '#ffffff30', font: { family: 'JetBrains Mono', size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 },
            },
            y: {
              beginAtZero: true,
              grid: { color: '#ffffff08' },
              ticks: { color: '#ffffff30', font: { family: 'JetBrains Mono', size: 10 }, precision: 0 },
            },
          },
        },
      });
    }

    function renderBarChart() {
      const toolData = allTools
        .map(t => ({ name: t.name, slug: t.slug, month: (stats.tools[t.slug] || {}).month || 0 }))
        .sort((a, b) => b.month - a.month);

      const ctx = $('barChart').getContext('2d');
      if (barChart) barChart.destroy();
      barChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: toolData.map(t => t.name),
          datasets: [{
            data: toolData.map(t => t.month),
            backgroundColor: toolData.map((_, i) => CHART_COLORS[i % CHART_COLORS.length] + '55'),
            borderColor: toolData.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]),
            borderWidth: 1,
            borderRadius: 6,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a2e',
              titleColor: '#ffffffcc',
              bodyColor: '#ffffff88',
              borderColor: '#ffffff15',
              borderWidth: 1,
              bodyFont: { family: 'JetBrains Mono', size: 12 },
              callbacks: {
                label: ctx => ctx.parsed.x + ' views',
              },
            },
          },
          scales: {
            x: {
              beginAtZero: true,
              grid: { color: '#ffffff08' },
              ticks: { color: '#ffffff30', font: { family: 'JetBrains Mono', size: 10 }, precision: 0 },
            },
            y: {
              grid: { display: false },
              ticks: { color: '#ffffff60', font: { family: 'Outfit', size: 12 } },
            },
          },
        },
      });
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    tryAutoLogin();
  </script>
</body>
</html>
