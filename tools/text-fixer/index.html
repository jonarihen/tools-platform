<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Fixer – tools.aaris.tech</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <style>
    .container { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }
    header { text-align: center; margin-bottom: 40px; }
    .icon { font-size: 32px; margin-bottom: 12px; }
    h1 {
      font-size: 40px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f8f8ff 0%, #a0a0b8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.45); font-weight: 300; }

    .badge {
      display: inline-block; margin-top: 12px; padding: 6px 14px;
      background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2);
      border-radius: 20px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; color: #c084fc;
      font-family: 'JetBrains Mono', monospace;
    }

    label {
      display: block; font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.5); margin-bottom: 8px;
      font-family: 'Outfit', sans-serif;
    }

    .editor-wrap { position: relative; margin-bottom: 8px; }

    textarea {
      width: 100%; min-height: 200px; padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; color: #e8e8ed; font-size: 14px; line-height: 1.7;
      font-family: 'Outfit', sans-serif; outline: none; resize: vertical;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: rgba(255,255,255,0.15); }
    textarea::placeholder { color: rgba(255,255,255,0.15); }

    .stats {
      display: flex; gap: 16px; justify-content: flex-end;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.2); margin-bottom: 24px;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }

    .btn-primary {
      padding: 14px 28px;
      background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(168,85,247,0.05));
      border: 1px solid rgba(168,85,247,0.3); border-radius: 12px;
      color: #c084fc; font-size: 15px; font-weight: 600;
      font-family: 'Outfit', sans-serif; cursor: pointer; flex: 1;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(168,85,247,0.1)); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      padding: 14px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 500;
      font-family: 'Outfit', sans-serif; cursor: pointer; flex: 1;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }

    .output-section { margin-top: 8px; }

    .output-header {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .tab {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      font-family: 'Outfit', sans-serif; cursor: pointer; border: none;
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4);
      transition: all 0.2s;
    }
    .tab.active {
      background: rgba(168,85,247,0.1); color: #c084fc;
      border: 1px solid rgba(168,85,247,0.2);
    }

    .output-box {
      width: 100%; min-height: 200px; padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(168,85,247,0.1);
      border-radius: 14px; color: #e8e8ed; font-size: 14px; line-height: 1.7;
      font-family: 'Outfit', sans-serif;
      white-space: pre-wrap; word-wrap: break-word;
    }

    .diff-add {
      background: rgba(34,197,94,0.15); color: #4ade80;
      border-radius: 3px; padding: 0 2px;
    }
    .diff-remove {
      background: rgba(239,68,68,0.15); color: #f87171;
      text-decoration: line-through; border-radius: 3px; padding: 0 2px;
    }

    .status {
      padding: 12px 16px; border-radius: 10px; font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      animation: fadeIn 0.3s ease;
    }
    .status.ok {
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      color: #4ade80;
    }
    .status.error {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }
    .status.info {
      background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2);
      color: #c084fc;
    }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(168,85,247,0.2);
      border-top-color: #c084fc; border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← tools.aaris.tech</a>
    <header>
      <div class="icon">✏️</div>
      <h1>Text Fixer</h1>
      <p class="subtitle">Fix spelling and grammar with AI</p>
      <div class="badge">AI-POWERED · LLAMA 3.1</div>
    </header>

    <label for="input">Your text</label>
    <div class="editor-wrap">
      <textarea id="input" placeholder="Paste or type your text here..." spellcheck="false"></textarea>
    </div>
    <div class="stats">
      <span id="wordCount">0 words</span>
      <span id="charCount">0 chars</span>
    </div>

    <div class="actions">
      <button class="btn-primary" id="fixBtn" onclick="fixText()">Fix Text</button>
      <button class="btn-secondary" onclick="copyOutput()">Copy</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
    </div>

    <div id="status"></div>

    <div class="output-section" id="outputSection" style="display:none;">
      <div class="output-header">
        <button class="tab active" id="tabCorrected" onclick="showTab('corrected')">Corrected</button>
        <button class="tab" id="tabChanges" onclick="showTab('changes')">Show Changes</button>
      </div>
      <div class="output-box" id="outputCorrected"></div>
      <div class="output-box" id="outputChanges" style="display:none;"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const fixBtn = document.getElementById('fixBtn');
    const statusEl = document.getElementById('status');
    const outputSection = document.getElementById('outputSection');
    const outputCorrected = document.getElementById('outputCorrected');
    const outputChanges = document.getElementById('outputChanges');
    const charCount = document.getElementById('charCount');
    const wordCount = document.getElementById('wordCount');

    let originalText = '';
    let correctedText = '';

    function updateStats() {
      const val = input.value;
      charCount.textContent = val.length.toLocaleString() + ' chars';
      const words = val.trim() ? val.trim().split(/\s+/).length : 0;
      wordCount.textContent = words.toLocaleString() + ' words';
    }

    function showStatus(msg, type) {
      statusEl.className = 'status ' + type;
      statusEl.innerHTML = msg;
      if (type === 'ok') {
        setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 4000);
      }
    }

    function clearStatus() {
      statusEl.textContent = '';
      statusEl.className = '';
    }

    function showTab(tab) {
      document.getElementById('tabCorrected').classList.toggle('active', tab === 'corrected');
      document.getElementById('tabChanges').classList.toggle('active', tab === 'changes');
      outputCorrected.style.display = tab === 'corrected' ? '' : 'none';
      outputChanges.style.display = tab === 'changes' ? '' : 'none';
    }

    async function fixText() {
      const text = input.value.trim();
      if (!text) return;
      if (text.length > 10000) {
        showStatus('Text is too long — max 10,000 characters', 'error');
        return;
      }

      fixBtn.disabled = true;
      fixBtn.innerHTML = '<span class="spinner"></span>Fixing...';
      outputSection.style.display = 'none';
      outputCorrected.textContent = '';
      outputChanges.innerHTML = '';
      clearStatus();

      try {
        const response = await fetch('/api/fix-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: 'Request failed' }));
          throw new Error(err.error || 'Request failed');
        }

        outputSection.style.display = '';
        showTab('corrected');
        originalText = text;
        correctedText = '';

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') break;
            try {
              const chunk = JSON.parse(payload);
              if (chunk.token) {
                correctedText += chunk.token;
                outputCorrected.textContent = correctedText;
              }
              if (chunk.error) {
                throw new Error(chunk.error);
              }
            } catch (e) {
              if (e.message && !e.message.includes('JSON')) throw e;
            }
          }
        }

        correctedText = correctedText.trim();
        outputCorrected.textContent = correctedText;
        renderDiff();
        showStatus('Done — text has been fixed', 'ok');

      } catch (e) {
        showStatus(e.message || 'Something went wrong', 'error');
      } finally {
        fixBtn.disabled = false;
        fixBtn.textContent = 'Fix Text';
      }
    }

    function renderDiff() {
      const oldWords = originalText.split(/(\s+)/);
      const newWords = correctedText.split(/(\s+)/);

      // Simple LCS-based word diff
      const m = oldWords.length, n = newWords.length;
      // For very long texts, fall back to simple display
      if (m * n > 250000) {
        outputChanges.innerHTML = '<span class="diff-remove">' + escHtml(originalText) + '</span><br><br>' +
                                  '<span class="diff-add">' + escHtml(correctedText) + '</span>';
        return;
      }

      const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = oldWords[i - 1] === newWords[j - 1]
            ? dp[i - 1][j - 1] + 1
            : Math.max(dp[i - 1][j], dp[i][j - 1]);
        }
      }

      const result = [];
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldWords[i - 1] === newWords[j - 1]) {
          result.push(escHtml(oldWords[i - 1]));
          i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
          result.push('<span class="diff-add">' + escHtml(newWords[j - 1]) + '</span>');
          j--;
        } else {
          result.push('<span class="diff-remove">' + escHtml(oldWords[i - 1]) + '</span>');
          i--;
        }
      }
      outputChanges.innerHTML = result.reverse().join('');
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function copyOutput() {
      const text = correctedText || input.value;
      if (!text.trim()) return;
      navigator.clipboard?.writeText(text).then(() => {
        showStatus('Copied to clipboard', 'info');
      });
    }

    function clearAll() {
      input.value = '';
      outputSection.style.display = 'none';
      outputCorrected.textContent = '';
      outputChanges.innerHTML = '';
      originalText = '';
      correctedText = '';
      clearStatus();
      updateStats();
      input.focus();
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        fixText();
      }
    });

    input.addEventListener('input', updateStats);
    updateStats();
  </script>
</body>
</html>
