<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Ranker – tools.aaris.tech</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <style>
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

    .back-row { text-align: center; margin-bottom: 12px; }
    header { text-align: center; margin-bottom: 48px; }
    .icon { font-size: 32px; margin-bottom: 12px; }
    h1 {
      font-size: 40px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f8f8ff 0%, #a0a0b8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; text-align: center;
    }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.45); font-weight: 300; text-align: center; }

    /* Phase panels */
    .phase { display: none; }
    .phase.active { display: block; animation: fadeSlideIn 0.4s ease; }

    @keyframes resultSlide {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Input phase */
    .add-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .csv-row { display: flex; gap: 10px; margin-bottom: 24px; }
    .csv-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 12px; color: rgba(255,255,255,0.35);
      font-size: 13px; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: all 0.2s; flex: 1; text-align: center;
    }
    .csv-label:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
    .csv-input { display: none; }
    .add-input {
      flex: 1; padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: #e8e8ed;
      font-size: 15px; font-family: 'Outfit', sans-serif; outline: none;
    }
    .add-input:focus { border-color: rgba(255,255,255,0.15); }
    .add-btn {
      padding: 14px 28px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: #e8e8ed;
      font-size: 15px; font-weight: 500;
      font-family: 'Outfit', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .add-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }

    .ticket-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 32px; }
    .ticket-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; animation: fadeIn 0.3s ease;
    }
    .ticket-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: rgba(255,255,255,0.25); min-width: 20px;
    }
    .ticket-text { flex: 1; font-size: 14px; color: rgba(255,255,255,0.75); }
    .ticket-remove {
      background: none; border: none; color: rgba(255,255,255,0.2);
      font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .ticket-remove:hover { color: rgba(255,255,255,0.5); }

    .start-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 16px 32px; width: 100%;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3); border-radius: 14px;
      color: #f59e0b; font-size: 16px; font-weight: 600;
      font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .start-btn:hover { background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(245,158,11,0.1)); }
    .hint-text { text-align: center; color: rgba(255,255,255,0.25); font-size: 14px; margin-top: 16px; }
    .mode-toggle {
      display: none; align-items: flex-start; gap: 12px;
      padding: 14px 16px; margin-bottom: 24px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
    }
    .mode-toggle input {
      margin-top: 2px; width: 16px; height: 16px; accent-color: #f59e0b;
      flex-shrink: 0;
    }
    .mode-copy { font-size: 14px; color: rgba(255,255,255,0.78); }
    .mode-note { display: block; margin-top: 4px; color: rgba(255,255,255,0.38); font-size: 13px; line-height: 1.5; }

    /* Sorting phase */
    .progress-track {
      height: 3px; background: rgba(255,255,255,0.06);
      border-radius: 2px; margin-bottom: 8px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f59e0b, #3b82f6);
      border-radius: 2px; transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 13px; color: rgba(255,255,255,0.3);
      font-family: 'JetBrains Mono', monospace;
      text-align: center; margin-bottom: 40px;
    }
    .vs-row { display: flex; gap: 16px; align-items: center; margin-bottom: 32px; }
    .choice-btn {
      flex: 1; padding: 32px 24px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; cursor: pointer; text-align: center;
      font-family: 'Outfit', sans-serif; color: #e8e8ed;
      transition: all 0.25s ease;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); min-height: 160px; justify-content: center;
    }
    .choice-btn:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .choice-btn.a:hover { border-color: #f59e0b; }
    .choice-btn.b:hover { border-color: #3b82f6; }
    .choice-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.2); letter-spacing: 0.1em;
    }
    .choice-text { font-size: 17px; font-weight: 500; line-height: 1.4; word-break: break-word; white-space: pre-line; }
    .choice-hint { font-size: 12px; color: rgba(255,255,255,0.2); font-weight: 300; }
    .vs-badge {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.3); flex-shrink: 0;
    }
    .group-grid { display: none; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 28px; }
    .group-grid.active { display: grid; }
    .group-choice { min-height: 140px; }
    .sort-tip { text-align: center; font-size: 13px; color: rgba(255,255,255,0.2); }

    /* Done phase */
    .results-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 40px; }
    .result-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      animation: resultSlide 0.4s ease both;
    }
    .rank-badge {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; flex-shrink: 0;
    }
    .rank-gold   { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
    .rank-silver { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
    .rank-bronze { background: linear-gradient(135deg, #b45309, #92400e); color: #fff; }
    .rank-other  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }
    .result-text { flex: 1; font-size: 15px; }
    .top-badge {
      font-size: 10px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #f59e0b; letter-spacing: 0.1em;
      padding: 4px 10px;
      background: rgba(245,158,11,0.1); border-radius: 6px;
    }
    .done-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn-secondary {
      padding: 14px 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 500;
      font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
    .btn-primary {
      padding: 16px 32px;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3); border-radius: 14px;
      color: #f59e0b; font-size: 16px; font-weight: 600;
      font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(245,158,11,0.1)); }
    @media (max-width: 640px) {
      .vs-row { flex-direction: column; }
      .vs-badge { width: 100%; height: auto; padding: 10px 0; border-radius: 12px; }
      .group-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-row">
      <a href="/" class="back">← tools.aaris.tech</a>
    </div>

    <header>
      <div class="icon">⚡</div>
      <h1>Ticket Ranker</h1>
      <p class="subtitle" id="subtitle">Add your tickets, then sort by comparing pairs</p>
    </header>

    <!-- Input phase -->
    <div class="phase active" id="phaseInput">
      <div class="add-row">
        <input type="text" class="add-input" id="ticketInput"
               placeholder="Enter a ticket name or description…" autocomplete="off" autofocus>
        <button class="add-btn" id="addBtn">Add</button>
      </div>
      <div class="csv-row">
        <label class="csv-label" for="csvInput">
          📄 Import from CSV
          <input type="file" id="csvInput" class="csv-input" accept=".csv,.tsv,.txt">
        </label>
      </div>
      <div class="ticket-list" id="ticketList"></div>
      <label class="mode-toggle" id="fastModeWrap">
        <input type="checkbox" id="fastModeToggle" checked>
        <span class="mode-copy">
          Use fast mode for 16+ tickets
          <span class="mode-note">Ranks 4 tickets at a time first, then orders those groups. Much faster, but slightly rougher than a full exact pass.</span>
        </span>
      </label>
      <button class="start-btn" id="startBtn" style="display:none">
        Start Ranking (<span id="ticketCount">0</span> tickets) →
      </button>
      <p class="hint-text" id="hintText" style="display:none">Add at least 2 tickets to start ranking</p>
    </div>

    <!-- Sorting phase -->
    <div class="phase" id="phaseSorting">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">~0% complete · comparison 1</div>

      <div class="vs-row" id="vsRow">
        <button class="choice-btn a" id="choiceA">
          <span class="choice-label">A</span>
          <span class="choice-text" id="itemA"></span>
          <span class="choice-hint" id="choiceAHint">← left arrow or click</span>
        </button>
        <div class="vs-badge">VS</div>
        <button class="choice-btn b" id="choiceB">
          <span class="choice-label">B</span>
          <span class="choice-text" id="itemB"></span>
          <span class="choice-hint" id="choiceBHint">→ right arrow or click</span>
        </button>
      </div>
      <div class="group-grid" id="groupGrid"></div>
      <p class="sort-tip" id="sortTip">💡 Uses binary insertion — use ← and → to choose faster</p>
    </div>

    <!-- Done phase -->
    <div class="phase" id="phaseDone">
      <div class="results-list" id="resultsList"></div>
      <div class="done-actions">
        <button class="btn-secondary" id="reRankBtn">Re-rank same tickets</button>
        <button class="btn-primary" id="resetBtn">Start fresh</button>
        <button class="btn-secondary" id="copyListBtn">Copy list</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let tickets = [];
    let activeItems = [];
    let sorted = [];
    let currentIdx = 0;
    let lo = 0, hi = 0;
    let doneComparisons = 0, totalComparisons = 0;
    let sortMode = 'exact';
    let sortStep = 'pair';
    let groupedTickets = [];
    let currentGroup = [];
    let rankedCurrentGroup = [];
    let currentGroupIndex = 0;
    let sortedGroups = [];

    function estimateComparisons(n) {
      let est = 0;
      for (let i = 1; i < n; i++) est += Math.ceil(Math.log2(i + 1));
      return est;
    }

    function estimateFastComparisons(n) {
      const groups = Math.ceil(n / 4);
      return (n - groups) + estimateComparisons(groups);
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setPhase(name) {
      ['phaseInput', 'phaseSorting', 'phaseDone'].forEach(id => {
        $(id).classList.remove('active');
      });
      $('phase' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');

      const subtitles = {
        input: 'Add your tickets, then sort by comparing pairs',
        sorting: sortMode === 'fast' ? 'Pick the most important ticket in each step' : 'Which ticket is more important?',
        done: sortMode === 'fast' ? "Here's your fast-ranked order" : "Here's your prioritized order",
      };
      $('subtitle').textContent = subtitles[name];
    }

    function trackRankEvent() {
      try {
        var b = new Blob([JSON.stringify({ slug: 'ticket-ranker', event: 'rank', value: sorted.length })], { type: 'application/json' });
        navigator.sendBeacon('/api/track', b);
      } catch (_) {}
    }

    function finishSort() {
      if (sortMode === 'fast' && sortStep === 'group-rank') {
        sorted = sortedGroups.flat();
      }
      setPhase('done');
      renderDone();
      trackRankEvent();
    }

    function formatChoiceText(entry) {
      if (Array.isArray(entry)) {
        const preview = entry.slice(1, 4).join(' · ');
        return preview ? `${entry[0]}\n${preview}` : entry[0];
      }
      return entry;
    }

    // ── Input phase ────────────────────────────────────────────────────────────
    function renderTicketList() {
      $('ticketList').innerHTML = tickets.map((t, i) => `
        <div class="ticket-item">
          <span class="ticket-num">${i + 1}</span>
          <span class="ticket-text">${escHtml(t)}</span>
          <button class="ticket-remove" data-idx="${i}" title="Remove">×</button>
        </div>
      `).join('');

      $('ticketList').querySelectorAll('.ticket-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          tickets.splice(+btn.dataset.idx, 1);
          renderTicketList();
        });
      });

      const n = tickets.length;
      $('ticketCount').textContent = n;
      $('startBtn').style.display = n >= 2 ? '' : 'none';
      $('hintText').style.display = n === 1 ? '' : 'none';
      $('fastModeWrap').style.display = n >= 16 ? 'flex' : 'none';
    }

    function addTicket() {
      const val = $('ticketInput').value.trim();
      if (!val || tickets.includes(val)) return;
      tickets.push(val);
      $('ticketInput').value = '';
      renderTicketList();
      $('ticketInput').focus();
    }

    $('ticketInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTicket(); });
    $('addBtn').addEventListener('click', addTicket);
    $('startBtn').addEventListener('click', startSort);

    // ── CSV import ─────────────────────────────────────────────────────────────

    function parseCSVRow(line) {
      const cells = [];
      let cur = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
          else if (ch === '"') { inQuotes = false; }
          else { cur += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { cells.push(cur); cur = ''; }
          else { cur += ch; }
        }
      }
      cells.push(cur);
      return cells.map(c => c.trim());
    }

    function importCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) return;

      const firstRow = parseCSVRow(lines[0]);
      const hdr = firstRow.map(c => c.toLowerCase());
      const titleIdx = hdr.findIndex(h => h === 'title' || h === 'subject' || h === 'summary' || h === 'ticket title' || h === 'name');
      const statusIdx = hdr.findIndex(h => h === 'status');
      const accountIdx = hdr.findIndex(h => h === 'account' || h === 'client' || h === 'company' || h === 'customer');

      const hasHeader = titleIdx !== -1;
      const dataLines = hasHeader ? lines.slice(1) : lines;

      for (const line of dataLines) {
        const cells = parseCSVRow(line);
        let val = '';
        if (hasHeader && titleIdx < cells.length) {
          val = cells[titleIdx];
          const parts = [];
          if (accountIdx !== -1 && cells[accountIdx]) parts.push(cells[accountIdx]);
          if (statusIdx !== -1 && cells[statusIdx]) parts.push(cells[statusIdx].trim());
          if (parts.length) val += ' — ' + parts.join(' · ');
        } else {
          val = cells.find(c => c) || '';
        }
        val = val.trim();
        if (val && !tickets.includes(val)) tickets.push(val);
      }
      renderTicketList();
    }

    $('csvInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { importCSV(reader.result); $('csvInput').value = ''; };
      reader.readAsText(file);
    });

    // ── Sort engine ────────────────────────────────────────────────────────────
    function startExactSort(items) {
      sortMode = 'exact';
      sortStep = 'pair';
      activeItems = items.slice();
      totalComparisons = estimateComparisons(activeItems.length);
      doneComparisons = 0;
      sorted = [activeItems[0]];
      currentIdx = 1;
      lo = 0;
      hi = 0;
      setPhase('sorting');
      renderSorting();
    }

    function startFastSort() {
      sortMode = 'fast';
      sortStep = 'group-pick';
      doneComparisons = 0;
      totalComparisons = estimateFastComparisons(tickets.length);
      groupedTickets = [];
      for (let i = 0; i < tickets.length; i += 4) groupedTickets.push(tickets.slice(i, i + 4));
      currentGroupIndex = -1;
      currentGroup = [];
      rankedCurrentGroup = [];
      sortedGroups = [];
      sorted = [];
      setPhase('sorting');
      advanceToNextGroupSelection();
    }

    function startSort() {
      if (tickets.length < 2) return;
      if (tickets.length >= 16 && $('fastModeToggle').checked) {
        startFastSort();
      } else {
        startExactSort(tickets);
      }
    }

    function advanceToNextGroupSelection() {
      currentGroupIndex++;
      while (currentGroupIndex < groupedTickets.length && groupedTickets[currentGroupIndex].length <= 1) {
        currentGroupIndex++;
      }

      if (currentGroupIndex >= groupedTickets.length) {
        if (groupedTickets.length <= 1) {
          sorted = groupedTickets[0] ? groupedTickets[0].slice() : [];
          finishSort();
        } else {
          sortStep = 'group-rank';
          sortedGroups = [groupedTickets[0].slice()];
          currentIdx = 1;
          lo = 0;
          hi = 0;
          renderSorting();
        }
        return;
      }

      currentGroup = groupedTickets[currentGroupIndex].slice();
      rankedCurrentGroup = [];
      sortStep = 'group-pick';
      renderSorting();
    }

    function chooseGroupCandidate(idx) {
      if (sortStep !== 'group-pick' || idx < 0 || idx >= currentGroup.length) return;
      doneComparisons++;
      rankedCurrentGroup.push(currentGroup.splice(idx, 1)[0]);

      if (currentGroup.length === 1) {
        rankedCurrentGroup.push(currentGroup[0]);
        groupedTickets[currentGroupIndex] = rankedCurrentGroup.slice();
        advanceToNextGroupSelection();
        return;
      }

      renderSorting();
    }

    function renderPairComparison(currentEntry, compareEntry, tip) {
      $('groupGrid').classList.remove('active');
      $('groupGrid').innerHTML = '';
      $('vsRow').style.display = 'flex';
      $('itemA').textContent = formatChoiceText(currentEntry);
      $('itemB').textContent = formatChoiceText(compareEntry);
      $('choiceAHint').textContent = '← left arrow or click';
      $('choiceBHint').textContent = '→ right arrow or click';
      $('sortTip').textContent = tip;

      const vsRow = $('vsRow');
      vsRow.style.animation = 'none';
      vsRow.offsetHeight;
      vsRow.style.animation = 'fadeSlideIn 0.35s ease';
    }

    function renderSorting() {
      const pct = totalComparisons > 0
        ? Math.min(100, Math.round((doneComparisons / totalComparisons) * 100))
        : 0;

      let stepLabel = `comparison ${doneComparisons + 1}`;
      if (sortMode === 'fast' && sortStep === 'group-pick') stepLabel = `group pick ${doneComparisons + 1}`;
      if (sortMode === 'fast' && sortStep === 'group-rank') stepLabel = `group comparison ${doneComparisons + 1}`;

      $('progressFill').style.width = pct + '%';
      $('progressLabel').textContent = `~${pct}% complete · ${stepLabel}`;

      if (sortMode === 'fast' && sortStep === 'group-pick') {
        $('vsRow').style.display = 'none';
        $('groupGrid').classList.add('active');
        $('groupGrid').innerHTML = currentGroup.map((ticket, idx) => `
          <button class="choice-btn group-choice" data-idx="${idx}">
            <span class="choice-label">${idx + 1}</span>
            <span class="choice-text">${escHtml(ticket)}</span>
            <span class="choice-hint">Press ${idx + 1} or click</span>
          </button>
        `).join('');
        $('groupGrid').querySelectorAll('.group-choice').forEach(btn => {
          btn.addEventListener('click', () => chooseGroupCandidate(+btn.dataset.idx));
        });
        $('sortTip').textContent = 'Fast mode: pick the most important ticket in this group. Use number keys 1-4.';
        return;
      }

      const mid = Math.floor((lo + hi) / 2);
      if (sortMode === 'fast' && sortStep === 'group-rank') {
        renderPairComparison(
          groupedTickets[currentIdx],
          sortedGroups[mid],
          'Fast mode: compare the leading ticket from each 4-ticket block. Use ← and →.'
        );
        return;
      }

      renderPairComparison(
        activeItems[currentIdx],
        sorted[mid],
        'Uses binary insertion — use ← and → to choose faster.'
      );
    }

    function choose(pickedCurrent) {
      if (sortMode === 'fast' && sortStep === 'group-pick') return;

      const targetList = sortMode === 'fast' && sortStep === 'group-rank' ? sortedGroups : sorted;
      const candidate = sortMode === 'fast' && sortStep === 'group-rank' ? groupedTickets[currentIdx] : activeItems[currentIdx];
      const mid = Math.floor((lo + hi) / 2);
      doneComparisons++;

      if (pickedCurrent) hi = mid - 1;
      else lo = mid + 1;

      if (lo > hi) {
        targetList.splice(lo, 0, candidate);
        currentIdx++;

        const totalItems = sortMode === 'fast' && sortStep === 'group-rank' ? groupedTickets.length : activeItems.length;
        if (currentIdx >= totalItems) {
          finishSort();
          return;
        }

        lo = 0;
        hi = targetList.length - 1;
      }

      renderSorting();
    }

    $('choiceA').addEventListener('click', () => choose(true));
    $('choiceB').addEventListener('click', () => choose(false));

    document.addEventListener('keydown', e => {
      if (!$('phaseSorting').classList.contains('active')) return;

      if (sortMode === 'fast' && sortStep === 'group-pick') {
        const idx = Number(e.key) - 1;
        if (idx >= 0 && idx < currentGroup.length) {
          e.preventDefault();
          chooseGroupCandidate(idx);
        }
        return;
      }

      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        choose(true);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        choose(false);
      }
    });

    // ── Done phase ─────────────────────────────────────────────────────────────
    function renderDone() {
      $('reRankBtn').textContent = sortMode === 'fast' ? 'Re-rank exact' : 'Re-rank same tickets';
      $('resultsList').innerHTML = sorted.map((t, i) => {
        const rankClass = i === 0 ? 'rank-gold' : i === 1 ? 'rank-silver' : i === 2 ? 'rank-bronze' : 'rank-other';
        return `
          <div class="result-item" style="animation-delay:${i * 60}ms">
            <div class="rank-badge ${rankClass}">${i + 1}</div>
            <span class="result-text">${escHtml(t)}</span>
            ${i === 0 ? '<span class="top-badge">TOP PRIORITY</span>' : ''}
          </div>
        `;
      }).join('');
    }

    $('reRankBtn').addEventListener('click', () => {
      activeItems = [];
      sorted = [];
      sortedGroups = [];
      currentIdx = 0;
      doneComparisons = 0;
      if (sortMode === 'fast') $('fastModeToggle').checked = false;
      setPhase('input');
      renderTicketList();
    });

    $('resetBtn').addEventListener('click', () => {
      tickets = [];
      activeItems = [];
      sorted = [];
      groupedTickets = [];
      sortedGroups = [];
      renderTicketList();
      $('fastModeToggle').checked = true;
      setPhase('input');
    });

    $('copyListBtn').addEventListener('click', () => {
      const text = sorted.map((t, i) => `${i + 1}. ${t}`).join('\n');
      navigator.clipboard?.writeText(text);
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    renderTicketList();
  </script>
<script src="/track.js"></script>
</body>
</html>
